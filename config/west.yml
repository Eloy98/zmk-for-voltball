manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    # 中文: PAW3222 轨迹球驱动和状态灯模块来源。
    # English: Remote for the PAW3222 trackball driver and status LED module.
    - name: sekigon-gonnoc
      url-base: https://github.com/sekigon-gonnoc
    # 中文: 输入处理器扩展来源，提供坐标变换、滚动映射和缩放等处理器。
    # English: Remote for input processor extensions such as XY transforms, scroll mapping, and scaling.
    - name: zettaface
      url-base: https://github.com/zettaface
    # 中文: 阈值临时层模块来源，用轨迹球移动触发指定层并在超时后退出。
    # English: Remote for the threshold temporary layer module, which activates a layer from pointer movement and times out.
    - name: gohanda11
      url-base: https://github.com/gohanda11
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: v0.3
      import: app/west.yml
    - name: zmk-feature-status-led
      remote: sekigon-gonnoc
      revision: main
    - name: zmk-driver-paw3222
      remote: sekigon-gonnoc
      revision: main
    - name: zmk-input-processor-keybind
      remote: zettaface
      revision: main
    - name: zmk-input-processor-threshold-temp-layer
      remote: gohanda11
      revision: main
  self:
    path: config
